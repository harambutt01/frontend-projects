<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grading System</title>
    <link rel="stylesheet" href="grade.css">
</head>

<body>
    <h1>Student Grading System</h1>

    <div id="card">

        <input type="text" id="studentName" placeholder="Enter Student Name">
           

        <div class="input-grid">
            <input type="number" id="Math" placeholder="Math (0-100)" min="0" max="100">
            <input type="number" id="English" placeholder="English (0-100)" min="0" max="100">
            <input type="number" id="Science" placeholder="Science (0-100)" min="0" max="100">
            <input type="number" id="Urdu" placeholder="Urdu (0-100)" min="0" max="100">
            <input type="number" id="Islamiat" placeholder="Islamiat (0-100)" min="0" max="100">
            <input type="number" id="PakStudy" placeholder="Pak Study (0-100)" min="0" max="100">
            <input type="number" id="Physics" placeholder="Physics (0-100)" min="0" max="100">
            <input type="number" id="Chemistry" placeholder="Chemistry (0-100)" min="0" max="100">






        </div>

        <button id="btn">Get Grades</button>

    </div>



    <div id="Result"></div>

    <script src="grade.js"></script>
</body>

</html>
