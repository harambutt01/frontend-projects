<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays function task</title>
</head>

<body>

    <h1>Array Function Output</h1>
    <div id="result"></div>
    <script>

        // function to find sum of array

        function getSum(arr) {
            let sum = 0
            for (let i = 0; i < arr.length; i++) {
                sum += arr[i]

            }
            return sum
        }





        // function to find largest & smallest of array


        function findMinMax(arr) {
            let largest = arr[0]
            let smallest = arr[0]
            for (let i = 1; i < arr.length; i++) {
                if (arr[i] > largest) {
                    largest = arr[i]
                }
                if (arr[i] < smallest) {
                    smallest = arr[i]
                }
            }
            return { largest, smallest }
        }





        // function to remove duplicate 


        function removeDuplicates(arr) {
            let unique = []
            for (let i = 0; i < arr.length; i++) {
                if (!unique.includes(arr[i])) {
                    unique.push(arr[i])
                }
            }
            return unique
        }



        // test array
        let numbers = [10, 20, 30, 20, 40, 10]

        //    sum
        let Sumresult = getSum(numbers)
        // Min & Max
        let minMaxResult = findMinMax(numbers)
        // remove Duplicates
        let uniqueArray = removeDuplicates(numbers)


        // display results

        document.getElementById('result').innerHTML = `
        <p>Original Array:  [${numbers}]</p>
        <p>Sum: ${Sumresult}</p>
        <p>Largest: ${minMaxResult.largest}</p>
        <p>Smallest: ${minMaxResult.smallest}</p>
        <p>Without Duplicates: [${uniqueArray}]</p>
`









    </script>
</body>

</html>
